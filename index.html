<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticker Print Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Unbounded:wght@400;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0f1013;
  --panel:#16181d;
  --card:#1e2028;
  --bd:#282c38;
  --bd2:#34394a;
  --tx:#dde1ea;
  --mu:#5c6070;
  --acc:#d4f060;
  --orange:#f0a060;
  --red:#f06070;
  --blue:#60c0f0;
}

body{background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}

/* ── TOP BAR ── */
.bar{height:46px;background:var(--panel);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0}
.bar-logo{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;color:var(--acc);letter-spacing:.04em;white-space:nowrap}
.bar-sep{width:1px;height:18px;background:var(--bd);flex-shrink:0}
.bar-info{font-size:10px;color:var(--mu)}
.bar-info b{color:var(--tx);font-weight:400}
.bar-right{margin-left:auto;display:flex;gap:6px}

.tbtn{font-family:'DM Mono',monospace;font-size:10px;padding:5px 13px;border-radius:4px;cursor:pointer;border:1px solid;transition:all .15s;letter-spacing:.04em;white-space:nowrap}
.tbtn-acc{background:var(--acc);border-color:var(--acc);color:#0c0d0f;font-weight:700}
.tbtn-acc:hover{background:#e2ff7a}
.tbtn-ghost{background:transparent;border-color:var(--bd2);color:var(--mu)}
.tbtn-ghost:hover{border-color:var(--tx);color:var(--tx)}
.tbtn-red{background:transparent;border-color:var(--bd);color:var(--mu)}
.tbtn-red:hover{border-color:var(--red);color:var(--red)}

/* ── LAYOUT ── */
.app{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:272px;min-width:272px;background:var(--panel);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sidebar-body{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bd2) transparent}

/* Step blocks */
.step{border-bottom:1px solid var(--bd);padding:14px 16px}
.step-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.step-num{width:18px;height:18px;border-radius:50%;background:var(--acc);color:#0c0d0f;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Unbounded',sans-serif}
.step-title{font-size:10px;font-weight:500;letter-spacing:.08em;color:var(--tx);text-transform:uppercase}

/* Field row */
.frow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.frow label{font-size:10px;color:var(--mu);width:44px;flex-shrink:0}
.frow input[type=number],.frow select{flex:1;background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:5px 8px;font-size:11px;font-family:'DM Mono',monospace;border-radius:3px;outline:none;transition:border-color .15s}
.frow input:focus,.frow select:focus{border-color:var(--acc)}
.frow .unit{font-size:10px;color:var(--mu);flex-shrink:0;min-width:20px}

/* Presets */
.presets{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:8px}
.pre{background:var(--bg);border:1px solid var(--bd);color:var(--mu);padding:5px 3px;font-size:9px;font-family:'DM Mono',monospace;border-radius:3px;cursor:pointer;text-align:center;line-height:1.6;transition:all .15s}
.pre:hover{border-color:var(--acc);color:var(--acc)}
.pre.on{border-color:var(--acc);background:rgba(212,240,96,.07);color:var(--acc)}
.pre-featured{grid-column:1/-1;background:rgba(212,240,96,.06);border-color:rgba(212,240,96,.4);color:var(--acc);font-size:10px;padding:7px}
.pre-featured:hover{background:rgba(212,240,96,.12)}
.pre-featured.on{background:rgba(212,240,96,.12);border-color:var(--acc)}

/* Drop zone */
.drop{border:2px dashed var(--bd2);border-radius:6px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.drop:hover,.drop.ov{border-color:var(--blue);background:rgba(96,192,240,.04)}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-ico{font-size:22px;margin-bottom:5px}
.drop p{font-size:10px;color:var(--mu);line-height:1.6}

/* Photo pills */
.plist{display:flex;flex-direction:column;gap:3px;margin-top:8px;max-height:160px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bd2) transparent}
.ppill{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:4px 7px;transition:border-color .15s}
.ppill:hover{border-color:var(--bd2)}
.pthumb{width:30px;height:30px;object-fit:cover;border-radius:2px;flex-shrink:0}
.pname{font-size:10px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pratio{font-size:9px;padding:1px 5px;border-radius:2px;border:1px solid;flex-shrink:0}
.prm{background:none;border:none;color:var(--mu);cursor:pointer;font-size:13px;padding:1px 3px;flex-shrink:0}
.prm:hover{color:var(--red)}

/* Row cards */
.row-list{display:flex;flex-direction:column;gap:6px}

.row-card{background:var(--card);border:1px solid var(--bd);border-radius:6px;overflow:hidden;transition:border-color .15s,box-shadow .15s;user-select:none}
.row-card.drag-over{border-color:var(--acc);box-shadow:0 0 0 2px rgba(212,240,96,.1)}
.row-card.dragging{opacity:.3}
.row-card.is-merged{border-color:rgba(240,160,96,.5)}

.rc-head{display:flex;align-items:center;gap:7px;padding:8px 10px;background:var(--panel);border-bottom:1px solid var(--bd);cursor:grab}
.rc-head:active{cursor:grabbing}
.rc-labels{display:flex;align-items:center;gap:5px;flex:1;flex-wrap:wrap}
.rc-ratio{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700}
.rc-count{font-size:9px;color:var(--mu)}
.rc-handle{color:var(--bd2);font-size:14px;margin-left:auto}
.rc-split{background:none;border:none;color:var(--mu);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:2px;transition:color .15s;line-height:1}
.rc-split:hover{color:var(--red)}

.rc-thumbs{display:flex;gap:2px;padding:6px 10px;flex-wrap:wrap;border-bottom:1px solid var(--bd);background:rgba(0,0,0,.15)}
.rc-thumb{height:22px;border-radius:2px;object-fit:cover;flex-shrink:0}

.rc-body{padding:10px;display:flex;flex-direction:column;gap:7px}

/* Inline controls inside row card */
.rc-ctrl{display:flex;align-items:center;gap:8px}
.rc-ctrl-lbl{font-size:9px;color:var(--mu);width:52px;flex-shrink:0}
.rc-slider{flex:1;accent-color:var(--acc);cursor:pointer;height:3px}
.rc-slider.orange{accent-color:var(--orange)}
.rc-val{font-size:10px;color:var(--tx);width:38px;text-align:right;flex-shrink:0}
.rc-num{width:52px;background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:3px 6px;font-size:10px;font-family:'DM Mono',monospace;border-radius:3px;outline:none;text-align:center}
.rc-num:focus{border-color:var(--acc)}

/* Merge bar at bottom of row card */
.rc-merge-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-top:1px solid var(--bd);background:rgba(0,0,0,.1)}
.rc-merge-bar label{font-size:9px;color:var(--mu);display:flex;align-items:center;gap:5px;cursor:pointer;flex:1}
.rc-merge-bar input[type=checkbox]{accent-color:var(--orange);width:11px;height:11px;cursor:pointer}
.merge-do-btn{font-family:'DM Mono',monospace;font-size:9px;padding:3px 10px;border-radius:3px;border:1px solid var(--orange);color:var(--orange);background:transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.merge-do-btn:hover{background:rgba(240,160,96,.1)}
.merge-do-btn:disabled{opacity:.3;cursor:not-allowed}

/* ── WORKSPACE ── */
.workspace{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{display:flex;align-items:center;gap:10px;padding:7px 16px;border-bottom:1px solid var(--bd);background:var(--panel);flex-shrink:0;font-size:10px;color:var(--mu)}
.toolbar b{color:var(--tx);font-weight:400}
.zg{display:flex;align-items:center;gap:4px}
.zb{background:var(--bg);border:1px solid var(--bd);color:var(--tx);width:22px;height:22px;border-radius:3px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.zb:hover{border-color:var(--acc);color:var(--acc)}
.zb.sm{font-size:9px;width:auto;padding:0 7px;letter-spacing:.05em}

.canvas-wrap{flex:1;overflow:auto;padding:32px;display:flex;align-items:flex-start;justify-content:center;scrollbar-width:thin;scrollbar-color:var(--bd2) transparent}

/* Ruler */
.rr-wrap{display:inline-flex;flex-direction:column}
.rr-row{display:flex}
.rr-corner{width:20px;height:20px;background:#0d0e10;border:1px solid var(--bd);flex-shrink:0}
.rr-h{height:20px;background:#0d0e10;border:1px solid var(--bd);border-left:none;overflow:hidden;display:block}
.rr-v{width:20px;background:#0d0e10;border:1px solid var(--bd);border-top:none;overflow:hidden;display:block;flex-shrink:0}

.canvas-outer{position:relative;overflow:hidden;border:1px solid var(--bd);border-left:none;border-top:none;background:#191b22}

/* Photo rows */
.photo-row{position:absolute;left:0;display:flex}
.pr-img{display:block;object-fit:cover;flex-shrink:0}

/* Row label */
.row-tag{position:absolute;top:0;left:0;font-family:'DM Mono',monospace;font-size:8px;font-weight:500;padding:2px 6px;pointer-events:none;z-index:2;border-radius:0 0 3px 0;letter-spacing:.04em}

/* Page divider */
.pages-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:28px}
.page-div{display:flex;align-items:center;gap:10px}
.page-div-line{flex:1;height:1px;background:var(--bd2)}
.page-div-lbl{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;color:var(--acc);letter-spacing:.1em;white-space:nowrap;background:var(--bg);padding:0 8px}

/* Empty state */
.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;gap:10px}
.empty-ico{font-size:32px;opacity:.15}
.empty p{font-size:10px;color:var(--mu);letter-spacing:.06em}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.photo-row{animation:fadeUp .2s ease both}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="bar">
  <div class="bar-logo">▦ STICKER PRINT</div>
  <div class="bar-sep"></div>
  <div class="bar-info">CANVAS <b id="hSize">5700 × 3900 px</b></div>
  <div class="bar-sep"></div>
  <div class="bar-info">PHOTOS <b id="hCount">0</b></div>
  <div class="bar-sep"></div>
  <div class="bar-info">PAGES <b id="hPages">—</b></div>
  <div class="bar-right">
    <button class="tbtn tbtn-ghost" id="btnRearrange">↻ Refresh</button>
    <button class="tbtn tbtn-acc" id="btnExport">↓ Export</button>
    <button class="tbtn tbtn-ghost" id="btnExportAll">↓ All Pages</button>
    <button class="tbtn tbtn-red" id="btnClear">Clear</button>
  </div>
</div>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-body">

      <!-- STEP 1: CANVAS -->
      <div class="step">
        <div class="step-head">
          <div class="step-num">1</div>
          <div class="step-title">Canvas Size</div>
        </div>
        <div class="frow">
          <label>Width</label>
          <input type="number" id="cW" value="19" min="1" max="500" step="0.5">
          <select id="cUnit" style="width:46px;flex:none">
            <option value="in" selected>in</option>
            <option value="px">px</option>
            <option value="mm">mm</option>
          </select>
        </div>
        <div class="frow">
          <label>Height</label>
          <input type="number" id="cH" value="13" min="1" max="500" step="0.5">
          <span class="unit" id="unitLbl" style="font-size:10px;color:var(--mu)">in</span>
        </div>
        <div class="frow">
          <label>PPI</label>
          <input type="number" id="cDPI" value="300" min="72" max="600">
        </div>
        <div class="presets">
          <button class="pre" data-w="1920" data-h="1080" data-u="px">16:9<br>1080p</button>
          <button class="pre" data-w="1080" data-h="1080" data-u="px">1:1<br>Sq</button>
          <button class="pre" data-w="2480" data-h="3508" data-u="px">A4<br>Port</button>
          <button class="pre" data-w="3508" data-h="2480" data-u="px">A4<br>Land</button>
          <button class="pre" data-w="1080" data-h="1920" data-u="px">9:16<br>Story</button>
          <button class="pre" data-w="2560" data-h="1440" data-u="px">16:9<br>2K</button>
          <button class="pre pre-featured on" id="preSticker" data-w="19" data-h="13" data-u="in">★ Ad Sticker Print — 19 × 13 in · 300 PPI</button>
        </div>
        <button class="tbtn tbtn-ghost" style="width:100%;margin-top:8px;font-size:10px" id="btnApply">Apply</button>
      </div>

      <!-- STEP 2: UPLOAD -->
      <div class="step">
        <div class="step-head">
          <div class="step-num">2</div>
          <div class="step-title">Upload Photos</div>
        </div>
        <div class="drop" id="drop">
          <input type="file" id="fileIn" multiple accept="image/*">
          <div class="drop-ico">🖼</div>
          <p>Drop photos here · or click to browse</p>
        </div>
        <div class="plist" id="plist"></div>
      </div>

      <!-- STEP 3: ROWS -->
      <div class="step" style="border-bottom:none">
        <div class="step-head">
          <div class="step-num">3</div>
          <div class="step-title">Arrange Rows</div>
        </div>
        <div class="row-list" id="rowList">
          <div style="font-size:10px;color:var(--mu);text-align:center;padding:10px 0">Upload photos to see rows</div>
        </div>
        <!-- Global merge action -->
        <button class="merge-do-btn" id="btnMerge" style="width:100%;margin-top:8px;padding:6px;font-size:10px" disabled>Merge Selected Rows</button>
      </div>

    </div>
  </div>

  <!-- WORKSPACE -->
  <div class="workspace">
    <div class="toolbar">
      ZOOM:
      <div class="zg">
        <button class="zb" id="zOut">−</button>
        <span id="zLbl" style="width:32px;text-align:center">8%</span>
        <button class="zb" id="zIn">+</button>
        <button class="zb sm" id="zFit">FIT</button>
      </div>
      &nbsp;|&nbsp; <b id="tSize">5700 × 3900 px</b>
      &nbsp;|&nbsp; Total height: <b id="tTH">—</b>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
      <div class="pages-wrap" id="pagesWrap"></div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let canvasW=5700, canvasH=3900, zoom=0.08;
let photos=[]; // {id,name,src,natW,natH,ratio,rk}
let rowOrder=[]; // effective order: each entry is a string (rk) or array (merged keys)
// rowOrder entries: string = single ratio key, array = merged group keys
// Per-entry settings: keyed by entryId
let entrySettings={}; // entryId → {rowH, gap, perRow}
// entryId for single = rk, for merged = keys.sort().join('|')

const PALETTE=['#d4f060','#60c0f0','#f060a0','#c060f0','#60f0b0','#f0a060','#a0d0ff','#f0d060'];
const rkColor={};let ci=0;
function clr(rk){if(!rkColor[rk]){rkColor[rk]=PALETTE[ci%PALETTE.length];ci++;}return rkColor[rk];}

const RATIOS={'1:1':1,'4:3':4/3,'3:4':3/4,'16:9':16/9,'9:16':9/16,'3:2':3/2,'2:3':2/3,'5:4':5/4,'4:5':4/5,'21:9':21/9};
function snapRatio(w,h){
  const r=w/h; let best=null,bd=Infinity;
  for(const[n,v] of Object.entries(RATIOS)){const d=Math.abs(r-v)/v;if(d<bd){bd=d;best=n;}}
  if(bd<0.07)return best;
  function gcd(a,b){return b===0?a:gcd(b,a%b);}
  const g=gcd(Math.round(w),Math.round(h));
  return `${Math.round(w/g)}:${Math.round(h/g)}`;
}

function entryId(e){return Array.isArray(e)?[...e].sort().join('|'):e;}
function defEntry(){return{rowH:400,gap:12,perRow:0};} // perRow 0 = fill width
function getSettings(e){const id=entryId(e);if(!entrySettings[id])entrySettings[id]=defEntry();return entrySettings[id];}

// ═══════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════
const pagesWrap=document.getElementById('pagesWrap');

function applyCanvas(){
  drawRulerTemplate();
  document.getElementById('hSize').textContent=`${canvasW} × ${canvasH} px`;
  document.getElementById('tSize').textContent=`${canvasW} × ${canvasH} px`;
  document.getElementById('zLbl').textContent=Math.round(zoom*100)+'%';
  arrange();
}

document.getElementById('btnApply').onclick=()=>{
  const unit=document.getElementById('cUnit').value;
  const dpi=parseInt(document.getElementById('cDPI').value)||300;
  let w=parseFloat(document.getElementById('cW').value)||19;
  let h=parseFloat(document.getElementById('cH').value)||13;
  if(unit==='in'){w=Math.round(w*dpi);h=Math.round(h*dpi);}
  else if(unit==='mm'){w=Math.round(w*dpi/25.4);h=Math.round(h*dpi/25.4);}
  canvasW=Math.max(100,Math.min(12000,w));
  canvasH=Math.max(100,Math.min(12000,h));
  document.querySelectorAll('.pre').forEach(b=>b.classList.remove('on'));
  applyCanvas();
};

document.querySelectorAll('.pre').forEach(b=>{
  b.addEventListener('click',()=>{
    const u=b.dataset.u||'px';
    const dpi=parseInt(document.getElementById('cDPI').value)||300;
    let w=parseFloat(b.dataset.w), h=parseFloat(b.dataset.h);
    document.getElementById('cW').value=w;
    document.getElementById('cH').value=h;
    document.getElementById('cUnit').value=u;
    document.getElementById('unitLbl').textContent=u;
    if(u==='in'){canvasW=Math.round(w*dpi);canvasH=Math.round(h*dpi);}
    else if(u==='mm'){canvasW=Math.round(w*dpi/25.4);canvasH=Math.round(h*dpi/25.4);}
    else{canvasW=Math.round(w);canvasH=Math.round(h);}
    document.querySelectorAll('.pre').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    applyCanvas();
  });
});

document.getElementById('cUnit').addEventListener('change',e=>{
  document.getElementById('unitLbl').textContent=e.target.value;
});

// ═══════════════════════════════════════════════════════
// RULER
// ═══════════════════════════════════════════════════════
// We draw rulers dynamically per page
function makeRuler(canvas,len,S,dir){
  canvas.width=dir==='h'?len:S;
  canvas.height=dir==='h'?S:len;
  if(dir==='h')canvas.style.width=len+'px';
  else canvas.style.height=len+'px';
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#0d0e10';ctx.fillRect(0,0,canvas.width,canvas.height);
  const steps=[1,2,5,10,25,50,100,250,500,1000,2000,5000];
  let step=50;for(const s of steps){if(s*zoom>=45){step=s;break;}}
  ctx.font='8px DM Mono,monospace';ctx.textBaseline='top';
  for(let px=0;px<=len/zoom;px+=step/10){
    const pos=Math.round(px*zoom);if(pos>len)break;
    const isM=(px%step)<.001,isMid=(px%(step/2))<.001&&!isM;
    const th=isM?S*.5:isMid?S*.3:S*.15;
    ctx.strokeStyle=isM?'#404452':isMid?'#2c2e3a':'#1e2028';
    ctx.lineWidth=isM?1:.5;
    ctx.beginPath();
    if(dir==='h'){ctx.moveTo(pos+.5,S-th);ctx.lineTo(pos+.5,S);if(isM&&px>0){ctx.fillStyle='#5c6070';ctx.fillText(Math.round(px),pos+2,2);}}
    else{ctx.moveTo(S-th,pos+.5);ctx.lineTo(S,pos+.5);if(isM&&px>0){ctx.save();ctx.fillStyle='#5c6070';ctx.translate(S-th-1,pos+2);ctx.rotate(-Math.PI/2);ctx.fillText(Math.round(px),0,0);ctx.restore();}}
    ctx.stroke();
  }
}

let rulerTemplate=null;
function drawRulerTemplate(){rulerTemplate=null;} // invalidate cache

function makePageDOM(pageIdx){
  const wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;';
  // Divider label
  const div=document.createElement('div');
  div.className='page-div';
  div.innerHTML=`<div class="page-div-line"></div><div class="page-div-lbl" id="plbl-${pageIdx}">PAGE ${pageIdx+1}</div><div class="page-div-line"></div>`;
  wrap.appendChild(div);
  // Ruler wrap
  const rrW=document.createElement('div');rrW.className='rr-wrap';
  const topR=document.createElement('div');topR.className='rr-row';
  const corner=document.createElement('div');corner.className='rr-corner';
  const rH=document.createElement('canvas');rH.className='rr-h';
  topR.appendChild(corner);topR.appendChild(rH);
  const midR=document.createElement('div');midR.className='rr-row';
  const rV=document.createElement('canvas');rV.className='rr-v';
  const co=document.createElement('div');co.className='canvas-outer';
  co.style.width=Math.round(canvasW*zoom)+'px';
  co.style.height=Math.round(canvasH*zoom)+'px';
  midR.appendChild(rV);midR.appendChild(co);
  rrW.appendChild(topR);rrW.appendChild(midR);
  wrap.appendChild(rrW);
  // Draw rulers
  const dw=Math.round(canvasW*zoom),dh=Math.round(canvasH*zoom),S=20;
  makeRuler(rH,dw,S,'h');
  makeRuler(rV,dh,S,'v');
  return{wrap,co};
}

// ═══════════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════════
document.getElementById('zIn').onclick=()=>{zoom=Math.min(3,+(zoom+.05).toFixed(2));applyCanvas();};
document.getElementById('zOut').onclick=()=>{zoom=Math.max(.02,+(zoom-.05).toFixed(2));applyCanvas();};
document.getElementById('zFit').onclick=()=>{
  const sc=document.getElementById('canvasWrap');
  zoom=Math.min((sc.clientWidth-70)/canvasW,(sc.clientHeight-80)/canvasH,1);
  zoom=Math.max(.02,+zoom.toFixed(3));
  applyCanvas();
};

// ═══════════════════════════════════════════════════════
// UPLOAD
// ═══════════════════════════════════════════════════════
const drop=document.getElementById('drop');
const fileIn=document.getElementById('fileIn');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('ov');});
drop.addEventListener('dragleave',()=>drop.classList.remove('ov'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('ov');handleFiles(e.dataTransfer.files);});
fileIn.addEventListener('change',e=>{handleFiles(e.target.files);fileIn.value='';});

function handleFiles(files){
  Array.from(files).filter(f=>f.type.startsWith('image/')).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const rk=snapRatio(img.width,img.height);
        photos.push({id:Date.now()+Math.random(),name:file.name,src:e.target.result,natW:img.width,natH:img.height,ratio:img.width/img.height,rk});
        rebuildOrder();
        renderPhotoList();
        renderRowList();
        arrange();
        document.getElementById('hCount').textContent=photos.length;
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderPhotoList(){
  const el=document.getElementById('plist');el.innerHTML='';
  photos.forEach(ph=>{
    const c=clr(ph.rk);
    const d=document.createElement('div');d.className='ppill';d.dataset.id=ph.id;
    d.innerHTML=`<img class="pthumb" src="${ph.src}"><span class="pname">${ph.name}</span><span class="pratio" style="color:${c};border-color:${c}40;background:${c}10">${ph.rk}</span><button class="prm" data-id="${ph.id}">×</button>`;
    d.querySelector('.prm').onclick=()=>{
      photos=photos.filter(p=>p.id!==ph.id);
      rebuildOrder();renderPhotoList();renderRowList();arrange();
      document.getElementById('hCount').textContent=photos.length;
    };
    el.appendChild(d);
  });
}

// ═══════════════════════════════════════════════════════
// ROW ORDER — entries are string (single rk) or array (merged)
// ═══════════════════════════════════════════════════════
function rebuildOrder(){
  const seen=new Set();
  photos.forEach(p=>seen.add(p.rk));
  // Remove entries whose keys are all gone
  rowOrder=rowOrder.filter(e=>{
    if(Array.isArray(e)) return e.some(k=>seen.has(k));
    return seen.has(e);
  });
  // Trim merged entries to only existing keys
  rowOrder=rowOrder.map(e=>{
    if(!Array.isArray(e))return e;
    const filtered=e.filter(k=>seen.has(k));
    return filtered.length===1?filtered[0]:filtered.length>1?filtered:null;
  }).filter(Boolean);
  // Add new ratio keys not in order yet
  const inOrder=new Set(rowOrder.flatMap(e=>Array.isArray(e)?e:[e]));
  photos.forEach(p=>{if(!inOrder.has(p.rk)){rowOrder.push(p.rk);}});
  // Clean up stale entrySettings
  const validIds=new Set(rowOrder.map(e=>entryId(e)));
  Object.keys(entrySettings).forEach(k=>{if(!validIds.has(k))delete entrySettings[k];});
}

// ═══════════════════════════════════════════════════════
// ROW LIST (sidebar)
// ═══════════════════════════════════════════════════════
let mergeChecked=new Set(); // entryIds checked for merge

function renderRowList(){
  const el=document.getElementById('rowList');el.innerHTML='';
  if(!rowOrder.length){
    el.innerHTML='<div style="font-size:10px;color:var(--mu);text-align:center;padding:10px 0">Upload photos to see rows</div>';
    document.getElementById('btnMerge').disabled=true;
    return;
  }
  const photosByRk={};
  photos.forEach(p=>{if(!photosByRk[p.rk])photosByRk[p.rk]=[];photosByRk[p.rk].push(p);});

  rowOrder.forEach(entry=>{
    const eid=entryId(entry);
    const isMerged=Array.isArray(entry);
    const keys=isMerged?entry:[entry];
    const allPh=keys.flatMap(k=>photosByRk[k]||[]);
    if(!allPh.length)return;
    const rs=getSettings(entry);

    const card=document.createElement('div');
    card.className='row-card'+(isMerged?' is-merged':'');
    card.dataset.eid=eid;

    // Head
    const head=document.createElement('div');head.className='rc-head';
    const labels=document.createElement('div');labels.className='rc-labels';
    keys.forEach(k=>{
      const s=document.createElement('span');s.className='rc-ratio';
      s.style.color=clr(k);s.textContent=k;labels.appendChild(s);
      if(isMerged&&keys.indexOf(k)<keys.length-1){
        const plus=document.createElement('span');plus.style.cssText='color:var(--mu);font-size:9px';plus.textContent='+';labels.appendChild(plus);
      }
    });
    const cnt=document.createElement('span');cnt.className='rc-count';cnt.textContent=`${allPh.length} photo${allPh.length!==1?'s':''}`;
    labels.appendChild(cnt);
    head.appendChild(labels);
    if(isMerged){
      const splitBtn=document.createElement('button');splitBtn.className='rc-split';splitBtn.title='Split merge';splitBtn.textContent='✕';
      splitBtn.onclick=e=>{e.stopPropagation();splitEntry(eid);};
      head.appendChild(splitBtn);
    }
    const handle=document.createElement('span');handle.className='rc-handle';handle.textContent='⠿';
    head.appendChild(handle);
    card.appendChild(head);

    // Thumbnails
    const thumbs=document.createElement('div');thumbs.className='rc-thumbs';
    allPh.slice(0,9).forEach(p=>{
      const img=document.createElement('img');img.className='rc-thumb';img.src=p.src;
      img.style.width=Math.round(p.ratio*22)+'px';thumbs.appendChild(img);
    });
    if(allPh.length>9){const m=document.createElement('span');m.style.cssText='font-size:9px;color:var(--mu);align-self:center;margin-left:3px';m.textContent=`+${allPh.length-9}`;thumbs.appendChild(m);}
    card.appendChild(thumbs);

    // Controls
    const body=document.createElement('div');body.className='rc-body';

    // Row height
    const sliderColor=isMerged?'orange':'';
    const maxH=Math.min(canvasH,4000);
    body.innerHTML=`
      <div class="rc-ctrl">
        <span class="rc-ctrl-lbl">Row height</span>
        <input type="range" class="rc-slider ${sliderColor}" data-key="rowH" min="40" max="${maxH}" step="10" value="${Math.min(rs.rowH,maxH)}">
        <span class="rc-val" id="rhv-${eid}">${rs.rowH}px</span>
      </div>
      <div class="rc-ctrl">
        <span class="rc-ctrl-lbl">Gap</span>
        <input type="range" class="rc-slider ${sliderColor}" data-key="gap" min="0" max="120" step="2" value="${rs.gap}">
        <span class="rc-val" id="gpv-${eid}">${rs.gap}px</span>
      </div>
      <div class="rc-ctrl">
        <span class="rc-ctrl-lbl">Per row</span>
        <input type="number" class="rc-num" data-key="perRow" min="0" max="30" value="${rs.perRow}" placeholder="auto">
        <span style="font-size:9px;color:var(--mu);margin-left:4px">0=auto</span>
      </div>
    `;

    body.querySelectorAll('input').forEach(inp=>{
      inp.addEventListener('input',ev=>{
        const k=ev.target.dataset.key;
        let v=ev.target.type==='range'?parseInt(ev.target.value):parseInt(ev.target.value)||0;
        getSettings(entry)[k]=v;
        if(k==='rowH'){const lbl=document.getElementById(`rhv-${eid}`);if(lbl)lbl.textContent=v+'px';}
        if(k==='gap'){const lbl=document.getElementById(`gpv-${eid}`);if(lbl)lbl.textContent=v+'px';}
        arrange();
      });
    });
    card.appendChild(body);

    // Merge checkbox bar
    const mergebar=document.createElement('div');mergebar.className='rc-merge-bar';
    const lbl=document.createElement('label');
    const cb=document.createElement('input');cb.type='checkbox';cb.dataset.eid=eid;
    cb.checked=mergeChecked.has(eid);
    cb.addEventListener('change',()=>{
      if(cb.checked)mergeChecked.add(eid);else mergeChecked.delete(eid);
      updateMergeBtn();
    });
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(' Select to merge'));
    mergebar.appendChild(lbl);
    card.appendChild(mergebar);

    bindRowDrag(card,eid,keys);
    el.appendChild(card);
  });

  updateMergeBtn();
}

function updateMergeBtn(){
  const btn=document.getElementById('btnMerge');
  // Remove stale checked
  mergeChecked.forEach(id=>{
    if(!rowOrder.some(e=>entryId(e)===id))mergeChecked.delete(id);
  });
  btn.disabled=mergeChecked.size<2;
}

function splitEntry(eid){
  const idx=rowOrder.findIndex(e=>entryId(e)===eid);
  if(idx<0)return;
  const entry=rowOrder[idx];
  if(!Array.isArray(entry))return;
  // Replace merged entry with individual entries
  rowOrder.splice(idx,1,...entry);
  mergeChecked.delete(eid);
  delete entrySettings[eid];
  renderRowList();arrange();
}

document.getElementById('btnMerge').onclick=()=>{
  if(mergeChecked.size<2)return;
  // Collect all keys from checked entries
  const allKeys=[];
  const indicesToRemove=[];
  rowOrder.forEach((e,i)=>{
    if(mergeChecked.has(entryId(e))){
      indicesToRemove.push(i);
      const keys=Array.isArray(e)?e:[e];
      keys.forEach(k=>{if(!allKeys.includes(k))allKeys.push(k);});
    }
  });
  // Insert merged entry at position of first checked
  const insertAt=indicesToRemove[0];
  // Remove in reverse order
  for(let i=indicesToRemove.length-1;i>=0;i--)rowOrder.splice(indicesToRemove[i],1);
  rowOrder.splice(insertAt,0,allKeys);
  mergeChecked.clear();
  rebuildOrder();
  renderRowList();arrange();
};

// ═══════════════════════════════════════════════════════
// DRAG REORDER
// ═══════════════════════════════════════════════════════
let dragEid=null,dragKeys=null;

function bindRowDrag(card,eid,keys){
  card.querySelector('.rc-head').addEventListener('mousedown',()=>card.setAttribute('draggable','true'));
  card.addEventListener('dragstart',e=>{dragEid=eid;dragKeys=keys;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  card.addEventListener('dragend',()=>{dragEid=null;dragKeys=null;card.classList.remove('dragging');document.querySelectorAll('.row-card').forEach(c=>c.classList.remove('drag-over'));});
  card.addEventListener('dragover',e=>{e.preventDefault();if(dragEid&&dragEid!==eid)card.classList.add('drag-over');});
  card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
  card.addEventListener('drop',e=>{
    e.preventDefault();card.classList.remove('drag-over');
    if(!dragEid||dragEid===eid||!dragKeys)return;
    const targetFirstKey=Array.isArray(keys)?keys[0]:keys[0];
    dragKeys.forEach(k=>{const i=rowOrder.findIndex(e=>e===k||(Array.isArray(e)&&e.includes(k)));if(i>=0)rowOrder.splice(i,1);});
    const ti=rowOrder.findIndex(e=>e===targetFirstKey||(Array.isArray(e)&&e.includes(targetFirstKey)));
    const insertEntry=dragKeys.length===1?dragKeys[0]:dragKeys;
    rowOrder.splice(Math.max(0,ti),0,insertEntry);
    renderRowList();arrange();
  });
}

// ═══════════════════════════════════════════════════════
// COMPUTE LAYOUT
// ═══════════════════════════════════════════════════════
function computeRows(){
  const byRk={};photos.forEach(p=>{if(!byRk[p.rk])byRk[p.rk]=[];byRk[p.rk].push(p);});
  const out=[];
  rowOrder.forEach(entry=>{
    const keys=Array.isArray(entry)?entry:[entry];
    const combined=keys.flatMap(k=>byRk[k]||[]);
    if(!combined.length)return;
    const rs=getSettings(entry);
    const isMerged=Array.isArray(entry);
    const color=isMerged?'#f0a060':clr(keys[0]);
    const label=keys.join('+');
    const perRow=rs.perRow||combined.length; // 0 = all in one row (fill-width)
    const g=rs.gap;

    // Split into chunks
    const chunks=[];
    for(let i=0;i<combined.length;i+=perRow)chunks.push(combined.slice(i,i+perRow));

    chunks.forEach(chunk=>{
      const n=chunk.length;
      // Fill-width: compute height so photos fill canvasW
      const sumR=chunk.reduce((s,p)=>s+p.ratio,0);
      let rowH,widths;
      if(rs.perRow===0){
        // fill width
        rowH=Math.max(10,Math.round((canvasW-g*(n+1))/sumR));
        widths=chunk.map(p=>Math.round(p.ratio*rowH));
      } else {
        // fixed per-row: equal width per slot, height from first photo's ratio
        const photoW=Math.max(1,Math.round((canvasW-g*(n+1))/n));
        widths=chunk.map(()=>photoW);
        rowH=Math.round(photoW/chunk[0].ratio);
      }
      out.push({photos:chunk,widths,rowH,g,label,color,n});
    });
  });
  return out;
}

// ═══════════════════════════════════════════════════════
// ARRANGE — multi-page
// ═══════════════════════════════════════════════════════
function arrange(){
  Array.from(pagesWrap.children).forEach(c=>c.remove());
  if(!photos.length){document.getElementById('hPages').textContent='—';return;}

  const rows=computeRows();
  if(!rows.length)return;

  // Paginate
  const pages=[];let curPage=[],curY=0;
  rows.forEach(row=>{
    const h=row.rowH+row.g;
    if(curY>0&&curY+h>canvasH){pages.push(curPage);curPage=[];curY=0;}
    curPage.push({row,yPx:curY});curY+=h;
  });
  if(curPage.length)pages.push(curPage);

  document.getElementById('hPages').textContent=`${pages.length} page${pages.length!==1?'s':''}`;
  document.getElementById('tTH').textContent=`${rows.length} rows`;

  pages.forEach((pageRows,pi)=>{
    const {wrap,co}=makePageDOM(pi);
    const photoCount=pageRows.reduce((s,{row})=>s+row.photos.length,0);
    const lbl=wrap.querySelector(`#plbl-${pi}`);
    if(lbl)lbl.textContent=`PAGE ${pi+1}  ·  ${photoCount} photo${photoCount!==1?'s':''}`;

    pageRows.forEach(({row,yPx})=>{
      const rowEl=document.createElement('div');
      rowEl.className='photo-row';
      rowEl.style.top=Math.round(yPx*zoom)+'px';
      rowEl.style.left=Math.round(row.g*zoom)+'px';
      rowEl.style.gap=Math.round(row.g*zoom)+'px';

      const tag=document.createElement('div');
      tag.className='row-tag';tag.style.background=row.color;
      tag.style.color='rgba(0,0,0,.65)';tag.textContent=row.label;
      rowEl.appendChild(tag);

      row.photos.forEach((ph,i)=>{
        const img=document.createElement('img');img.className='pr-img';img.src=ph.src;
        img.style.width=Math.round(row.widths[i]*zoom)+'px';
        img.style.height=Math.round(row.rowH*zoom)+'px';
        img.title=`${ph.name}  ${row.widths[i]}×${row.rowH}px`;
        rowEl.appendChild(img);
      });
      co.appendChild(rowEl);
    });

    // Add empty hint on first page if no photos
    if(pi===0&&!photos.length){
      const e=document.createElement('div');e.className='empty';
      e.innerHTML='<div class="empty-ico">🏞</div><p>UPLOAD PHOTOS TO BEGIN</p>';
      co.appendChild(e);
    }

    pagesWrap.appendChild(wrap);
  });
}

// ═══════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════
function buildExportPages(){
  const rows=computeRows();
  const pages=[];let cur=[],cy=0;
  rows.forEach(r=>{
    const h=r.rowH+r.g;
    if(cy>0&&cy+h>canvasH){pages.push(cur);cur=[];cy=0;}
    cur.push({row:r,yPx:cy});cy+=h;
  });
  if(cur.length)pages.push(cur);
  return pages;
}

async function renderExport(pageRows){
  const ec=document.createElement('canvas');
  ec.width=canvasW;ec.height=canvasH;
  const ctx=ec.getContext('2d');
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvasW,canvasH);
  const draws=[];
  pageRows.forEach(({row,yPx})=>{
    let x=row.g;
    row.photos.forEach((ph,i)=>{draws.push({src:ph.src,x,y:yPx,w:row.widths[i],h:row.rowH});x+=row.widths[i]+row.g;});
  });
  return new Promise(res=>{
    if(!draws.length){res(ec);return;}
    let p=draws.length;
    draws.forEach(d=>{const img=new Image();img.onload=()=>{ctx.drawImage(img,d.x,d.y,d.w,d.h);if(--p===0)res(ec);};img.src=d.src;});
  });
}

function dlCanvas(c,n){const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=n;a.click();}

document.getElementById('btnExport').onclick=async()=>{
  const pages=buildExportPages();if(!pages.length)return;
  const ec=await renderExport(pages[0]);
  dlCanvas(ec,`sticker-print-p1-${canvasW}x${canvasH}.png`);
};

document.getElementById('btnExportAll').onclick=async()=>{
  const pages=buildExportPages();
  for(let i=0;i<pages.length;i++){
    const ec=await renderExport(pages[i]);
    dlCanvas(ec,`sticker-print-p${i+1}-${canvasW}x${canvasH}.png`);
    if(i<pages.length-1)await new Promise(r=>setTimeout(r,300));
  }
};

// ═══════════════════════════════════════════════════════
// CLEAR / REFRESH
// ═══════════════════════════════════════════════════════
document.getElementById('btnRearrange').onclick=()=>{renderRowList();arrange();};

document.getElementById('btnClear').onclick=()=>{
  photos=[];rowOrder=[];entrySettings={};mergeChecked.clear();
  Object.keys(rkColor).forEach(k=>delete rkColor[k]);ci=0;
  document.getElementById('plist').innerHTML='';
  document.getElementById('hCount').textContent='0';
  document.getElementById('hPages').textContent='—';
  Array.from(pagesWrap.children).forEach(c=>c.remove());
  renderRowList();
};

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
applyCanvas();
setTimeout(()=>document.getElementById('zFit').click(),120);
</script>
