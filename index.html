<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticker Print Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f3f0;
  --white: #fafaf8;
  --ink: #1a1a18;
  --ink2: #4a4a46;
  --ink3: #9a9a94;
  --line: #e0dfd8;
  --line2: #ccccc4;
  --acc: #1a1a18;
  --green: #2d6a4f;
  --red: #c0392b;
  --orange: #d4622a;
  --blue: #2563a8;
  --sel: #e8f4ff;
  --sel-bd: #2563a8;
}

body {
  font-family: 'Geist Mono', 'Courier New', monospace;
  background: var(--bg);
  color: var(--ink);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 12px;
}

/* ── TOP BAR ── */
.topbar {
  height: 44px;
  background: var(--white);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 0;
  flex-shrink: 0;
}
.logo {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .06em;
  color: var(--ink);
  text-transform: uppercase;
  padding-right: 16px;
  border-right: 1px solid var(--line);
  margin-right: 16px;
  white-space: nowrap;
}
.bar-stat {
  font-size: 10px;
  color: var(--ink3);
  margin-right: 14px;
  white-space: nowrap;
}
.bar-stat b { color: var(--ink); font-weight: 500; }
.bar-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }

.btn {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .04em;
  padding: 5px 12px;
  border-radius: 3px;
  border: 1px solid;
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}
.btn-dark { background: var(--ink); border-color: var(--ink); color: var(--white); }
.btn-dark:hover { background: #333330; }
.btn-outline { background: transparent; border-color: var(--line2); color: var(--ink2); }
.btn-outline:hover { border-color: var(--ink); color: var(--ink); }
.btn-ghost { background: transparent; border-color: transparent; color: var(--ink3); }
.btn-ghost:hover { color: var(--red); border-color: var(--line); }
.btn-blue { background: var(--blue); border-color: var(--blue); color: #fff; }
.btn-blue:hover { background: #1d4f8a; }
.btn-orange { background: var(--orange); border-color: var(--orange); color: #fff; }
.btn-orange:hover { background: #b5521f; }
.btn:disabled { opacity: .35; cursor: not-allowed; }

/* ── LAYOUT ── */
.app { display: flex; flex: 1; overflow: hidden; }

/* ── LEFT PANEL ── */
.panel {
  width: 260px;
  min-width: 260px;
  background: var(--white);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-body { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--line2) transparent; }

.section { padding: 14px 14px; border-bottom: 1px solid var(--line); }
.sec-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 10px;
}

/* Canvas fields */
.field { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.field label { font-size: 10px; color: var(--ink3); width: 40px; flex-shrink: 0; }
.field input, .field select {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--line);
  color: var(--ink);
  padding: 4px 7px;
  font-size: 11px;
  font-family: 'Geist Mono', monospace;
  border-radius: 2px;
  outline: none;
}
.field input:focus, .field select:focus { border-color: var(--ink); }
.field .u { font-size: 10px; color: var(--ink3); flex-shrink: 0; }

.presets { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-top: 8px; }
.pre {
  background: var(--bg);
  border: 1px solid var(--line);
  color: var(--ink3);
  padding: 5px 3px;
  font-size: 9px;
  font-family: 'Geist Mono', monospace;
  border-radius: 2px;
  cursor: pointer;
  text-align: center;
  line-height: 1.5;
  transition: all .12s;
}
.pre:hover { border-color: var(--ink); color: var(--ink); }
.pre.on { border-color: var(--ink); background: var(--ink); color: var(--white); }
.pre-sticker {
  grid-column: 1/-1;
  font-size: 10px;
  padding: 6px;
  border-style: dashed;
}

/* Drop zone */
.drop {
  border: 1px dashed var(--line2);
  border-radius: 3px;
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
  position: relative;
  background: var(--bg);
}
.drop:hover, .drop.ov { border-color: var(--blue); background: var(--sel); }
.drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.drop p { font-size: 10px; color: var(--ink3); line-height: 1.6; }

/* Photo list */
.photo-list { display: flex; flex-direction: column; gap: 2px; margin-top: 8px; max-height: 220px; overflow-y: auto; }

.photo-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 6px;
  border-radius: 2px;
  border: 1px solid transparent;
  cursor: grab;
  transition: all .1s;
  user-select: none;
  position: relative;
}
.photo-item:hover { background: var(--bg); border-color: var(--line); }
.photo-item.selected { background: var(--sel); border-color: var(--sel-bd); }
.photo-item.dragging-photo { opacity: .3; }
.photo-item.drag-over-photo { border-top: 2px solid var(--blue); }

.photo-item input[type=checkbox] {
  accent-color: var(--blue);
  width: 12px; height: 12px;
  cursor: pointer;
  flex-shrink: 0;
}
.ph-thumb { width: 28px; height: 28px; object-fit: cover; border-radius: 1px; flex-shrink: 0; }
.ph-info { flex: 1; min-width: 0; }
.ph-name { font-size: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
.ph-ratio { font-size: 8px; color: var(--ink3); margin-top: 1px; }
.ph-dup { font-size: 8px; background: #fff3cd; color: #856404; border: 1px solid #ffc107; border-radius: 2px; padding: 0 4px; flex-shrink: 0; }
.ph-rm { background: none; border: none; color: var(--ink3); cursor: pointer; font-size: 13px; padding: 1px 3px; flex-shrink: 0; line-height: 1; }
.ph-rm:hover { color: var(--red); }
.ph-drag-handle { color: var(--line2); font-size: 11px; cursor: grab; flex-shrink: 0; }

/* Selection actions */
.sel-actions {
  display: none;
  gap: 4px;
  margin-top: 6px;
  padding: 8px;
  background: var(--sel);
  border: 1px solid var(--sel-bd);
  border-radius: 3px;
  flex-direction: column;
}
.sel-actions.visible { display: flex; }
.sel-actions-title { font-size: 9px; color: var(--blue); font-weight: 600; margin-bottom: 2px; }
.sel-actions-row { display: flex; gap: 4px; }

/* Row list */
.row-list { display: flex; flex-direction: column; gap: 4px; }

.row-card {
  border: 1px solid var(--line);
  border-radius: 3px;
  background: var(--bg);
  overflow: hidden;
  transition: border-color .1s, box-shadow .1s;
  cursor: grab;
}
.row-card:active { cursor: grabbing; }
.row-card.drag-over-row { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(37,99,168,.15); }
.row-card.dragging-row { opacity: .3; }
.row-card.is-custom { border-color: var(--orange); }

.rc-head {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  background: var(--white);
  border-bottom: 1px solid var(--line);
}
.rc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.rc-name { font-size: 10px; font-weight: 500; flex: 1; }
.rc-cnt { font-size: 9px; color: var(--ink3); }
.rc-handle { color: var(--line2); font-size: 12px; margin-left: auto; }
.rc-rm { background: none; border: none; color: var(--ink3); cursor: pointer; font-size: 12px; padding: 1px 3px; line-height: 1; }
.rc-rm:hover { color: var(--red); }

.rc-thumbs {
  display: flex; gap: 2px; padding: 5px 8px; flex-wrap: wrap;
  background: var(--bg); border-bottom: 1px solid var(--line);
}
.rc-t { height: 20px; border-radius: 1px; object-fit: cover; flex-shrink: 0; }

.rc-ctrls { padding: 7px 8px; display: flex; flex-direction: column; gap: 5px; }
.rc-row { display: flex; align-items: center; gap: 6px; }
.rc-lbl { font-size: 9px; color: var(--ink3); width: 58px; flex-shrink: 0; }
.rc-sl { flex: 1; accent-color: var(--ink); cursor: pointer; }
.rc-sl.orange { accent-color: var(--orange); }
.rc-slv { font-size: 9px; color: var(--ink2); width: 34px; text-align: right; flex-shrink: 0; }
.rc-n {
  width: 46px; background: var(--white); border: 1px solid var(--line);
  color: var(--ink); padding: 2px 5px; font-size: 10px;
  font-family: 'Geist Mono', monospace; border-radius: 2px; outline: none; text-align: center;
}
.rc-n:focus { border-color: var(--ink); }
.rc-hint { font-size: 8px; color: var(--ink3); }

/* ── WORKSPACE ── */
.workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

.toolbar {
  height: 36px;
  background: var(--white);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  font-size: 10px;
  color: var(--ink3);
  flex-shrink: 0;
}
.toolbar b { color: var(--ink); font-weight: 500; }
.zg { display: flex; align-items: center; gap: 3px; }
.zb {
  background: var(--bg); border: 1px solid var(--line); color: var(--ink);
  width: 20px; height: 20px; border-radius: 2px; cursor: pointer;
  font-size: 13px; display: flex; align-items: center; justify-content: center;
  font-family: monospace; transition: border-color .1s;
}
.zb:hover { border-color: var(--ink); }
.zb.t { width: auto; padding: 0 6px; font-size: 9px; letter-spacing: .04em; }

.canvas-scroll {
  flex: 1; overflow: auto; padding: 28px;
  display: flex; align-items: flex-start; justify-content: center;
  scrollbar-width: thin; scrollbar-color: var(--line2) transparent;
}

/* Ruler */
.rr-wrap { display: inline-flex; flex-direction: column; }
.rr-row { display: flex; }
.rr-corner { width: 18px; height: 18px; background: var(--white); border: 1px solid var(--line); flex-shrink: 0; }
.rr-h { height: 18px; background: var(--white); border: 1px solid var(--line); border-left: none; display: block; overflow: hidden; }
.rr-v { width: 18px; background: var(--white); border: 1px solid var(--line); border-top: none; display: block; overflow: hidden; flex-shrink: 0; }

/* Canvas */
.canvas-outer {
  position: relative; overflow: hidden;
  border: 1px solid var(--line); border-left: none; border-top: none;
  background: #ffffff;
}

/* Rows on canvas */
.canvas-row { position: absolute; left: 0; display: flex; }
.canvas-img { display: block; object-fit: cover; flex-shrink: 0; }
.row-label {
  position: absolute; top: 0; left: 0;
  font-family: 'Geist Mono', monospace; font-size: 7px; font-weight: 600;
  padding: 2px 5px; letter-spacing: .04em; pointer-events: none; z-index: 2;
  border-radius: 0 0 2px 0;
}

/* Pages */
.pages-wrap { display: flex; flex-direction: column; gap: 24px; align-items: flex-start; }
.page-sep { display: flex; align-items: center; gap: 8px; }
.page-sep-line { flex: 1; height: 1px; background: var(--line2); }
.page-sep-lbl {
  font-size: 9px; font-weight: 600; color: var(--ink3);
  letter-spacing: .08em; white-space: nowrap;
  background: var(--bg); padding: 0 6px;
}

/* Empty */
.empty { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; gap: 8px; }
.empty-ico { font-size: 28px; opacity: .2; }
.empty p { font-size: 10px; color: var(--ink3); letter-spacing: .06em; }

/* Duplicate warning toast */
.dup-bar {
  display: none;
  background: #fff3cd; border-bottom: 1px solid #ffc107;
  padding: 5px 14px; font-size: 10px; color: #664d03;
  align-items: center; gap: 8px; flex-shrink: 0;
}
.dup-bar.show { display: flex; }
.dup-bar button { margin-left: auto; }

@keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
.canvas-row { animation: fadeUp .18s ease both; }
/* Photo cell: uniform height, no crop, blank pad */
.canvas-cell {
  position: relative;
  flex-shrink: 0;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  border: 1px solid transparent;
  transition: border-color .1s, box-shadow .1s;
  box-sizing: border-box;
}
.canvas-cell:hover { border-color: rgba(37,99,168,.4); }
.canvas-cell.dragging-cell { opacity: .25; cursor: grabbing; }
.canvas-cell.drop-before { box-shadow: -3px 0 0 0 #2563a8; }
.canvas-cell.drop-after  { box-shadow:  3px 0 0 0 #2563a8; }
.canvas-cell img { display: block; pointer-events: none; max-width: 100%; max-height: 100%; object-fit: contain; }
.cell-drag-hint {
  position: absolute; top: 2px; right: 2px;
  font-size: 8px; color: rgba(0,0,0,.25); line-height: 1;
  pointer-events: none;
}


::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">Sticker Print</div>
  <div class="bar-stat">Canvas <b id="hSize">5700 × 3900</b></div>
  <div class="bar-stat">Photos <b id="hCount">0</b></div>
  <div class="bar-stat">Pages <b id="hPages">—</b></div>
  <div class="bar-actions">
    <button class="btn btn-outline" id="btnRearrange">↻ Refresh</button>
    <button class="btn btn-outline" id="btnExport">↓ Page</button>
    <button class="btn btn-dark" id="btnExportAll">↓ All Pages</button>
    <button class="btn btn-ghost" id="btnClear">Clear</button>
  </div>
</div>

<!-- Duplicate warning -->
<div class="dup-bar" id="dupBar">
  <span id="dupMsg"></span>
  <button class="btn btn-outline" id="btnRemoveDups" style="font-size:9px;padding:3px 8px">Remove Duplicates</button>
</div>

<div class="app">

  <!-- LEFT PANEL -->
  <div class="panel">
    <div class="panel-body">

      <!-- CANVAS -->
      <div class="section">
        <div class="sec-label">Canvas</div>
        <div class="field">
          <label>Width</label>
          <input type="number" id="cW" value="19" min="1" max="500" step="0.5">
          <select id="cUnit" style="width:40px;flex:none">
            <option value="in" selected>in</option>
            <option value="px">px</option>
            <option value="mm">mm</option>
          </select>
        </div>
        <div class="field">
          <label>Height</label>
          <input type="number" id="cH" value="13" min="1" max="500" step="0.5">
          <span class="u" id="uLbl">in</span>
        </div>
        <div class="field">
          <label>PPI</label>
          <input type="number" id="cDPI" value="300" min="72" max="600">
        </div>
        <div class="presets">
          <button class="pre" data-w="1920" data-h="1080" data-u="px">FHD<br>16:9</button>
          <button class="pre" data-w="1080" data-h="1080" data-u="px">SQ<br>1:1</button>
          <button class="pre" data-w="3508" data-h="2480" data-u="px">A4<br>L</button>
          <button class="pre" data-w="2480" data-h="3508" data-u="px">A4<br>P</button>
          <button class="pre" data-w="1080" data-h="1920" data-u="px">9:16<br>Story</button>
          <button class="pre" data-w="2560" data-h="1440" data-u="px">2K<br>16:9</button>
          <button class="pre pre-sticker on" id="preSticker" data-w="19" data-h="13" data-u="in">★ Ad Sticker Print · 19×13 in · 300 PPI</button>
        </div>
        <button class="btn btn-outline" style="width:100%;margin-top:8px;font-size:10px" id="btnApply">Apply Canvas</button>
      </div>

      <!-- UPLOAD -->
      <div class="section">
        <div class="sec-label">Photos <span style="font-weight:400;color:var(--ink3)">(drag to reorder)</span></div>
        <div class="drop" id="drop">
          <input type="file" id="fileIn" multiple accept="image/*">
          <p>Drop photos here · click to browse</p>
        </div>
        <div class="photo-list" id="photoList"></div>
        <div class="sel-actions" id="selActions">
          <div class="sel-actions-title" id="selTitle">0 selected</div>
          <div class="sel-actions-row">
            <button class="btn btn-blue" id="btnMakeRow" style="flex:1;font-size:9px">Make Custom Row</button>
            <button class="btn btn-outline" id="btnClearSel" style="font-size:9px">Clear</button>
          </div>
        </div>
      </div>

      <!-- ROWS -->
      <div class="section" style="border-bottom:none">
        <div class="sec-label">Rows <span style="font-weight:400;color:var(--ink3)">(drag to reorder)</span></div>
        <div class="row-list" id="rowList">
          <div style="font-size:10px;color:var(--ink3);text-align:center;padding:10px 0">Upload photos to see rows</div>
        </div>
      </div>

    </div>
  </div>

  <!-- WORKSPACE -->
  <div class="workspace">
    <div class="toolbar">
      <span>Zoom</span>
      <div class="zg">
        <button class="zb" id="zOut">−</button>
        <span id="zLbl" style="width:30px;text-align:center;font-size:10px">8%</span>
        <button class="zb" id="zIn">+</button>
        <button class="zb t" id="zFit">Fit</button>
      </div>
      <span style="margin-left:8px"><b id="tSize">5700 × 3900 px</b></span>
    </div>
    <div class="canvas-scroll" id="canvasScroll">
      <div class="pages-wrap" id="pagesWrap"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════ STATE ═══════════════
let canvasW = 5700, canvasH = 3900, zoom = 0.08;
let photos = []; // {id, name, src, hash, natW, natH, ratio, rk}
// rowOrder: array of entries. Each entry = {type:'auto'|'custom', keys:[], id, settings:{rowH,gap,perRow}}
let rowOrder = [];
let selectedPhotoIds = new Set();

const PALETTE = ['#1a6b3c','#1a4a8c','#7a2020','#5c1a7a','#1a6060','#7a4e1a','#2a4a1a','#7a1a50'];
const rkColorMap = {}; let ci = 0;
function rkColor(rk){ if(!rkColorMap[rk]){rkColorMap[rk]=PALETTE[ci%PALETTE.length];ci++;} return rkColorMap[rk]; }

const KNOWN_RATIOS = {'1:1':1,'4:3':4/3,'3:4':3/4,'16:9':16/9,'9:16':9/16,'3:2':3/2,'2:3':2/3,'5:4':5/4,'4:5':4/5};
function snapRatio(w,h){
  const r=w/h; let best=null, bd=Infinity;
  for(const[n,v] of Object.entries(KNOWN_RATIOS)){const d=Math.abs(r-v)/v; if(d<bd){bd=d;best=n;}}
  if(bd<0.07) return best;
  function gcd(a,b){return b===0?a:gcd(b,a%b);}
  const g=gcd(Math.round(w),Math.round(h)); return `${Math.round(w/g)}:${Math.round(h/g)}`;
}

function makeId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function defSettings(){ return {rowH:400, gap:12, perRow:0}; }

// Simple hash for duplicate detection (name + size)
function photoHash(file){ return file.name+'|'+file.size; }

// ═══════════════ CANVAS ═══════════════
const pagesWrap = document.getElementById('pagesWrap');

function applyCanvas(){
  document.getElementById('hSize').textContent = `${canvasW} × ${canvasH}`;
  document.getElementById('tSize').textContent = `${canvasW} × ${canvasH} px`;
  document.getElementById('zLbl').textContent = Math.round(zoom*100)+'%';
  arrange();
}

document.getElementById('btnApply').onclick = () => {
  const unit = document.getElementById('cUnit').value;
  const dpi = parseInt(document.getElementById('cDPI').value)||300;
  let w = parseFloat(document.getElementById('cW').value)||19;
  let h = parseFloat(document.getElementById('cH').value)||13;
  if(unit==='in'){w=Math.round(w*dpi);h=Math.round(h*dpi);}
  else if(unit==='mm'){w=Math.round(w*dpi/25.4);h=Math.round(h*dpi/25.4);}
  else{w=Math.round(w);h=Math.round(h);}
  canvasW=Math.max(100,Math.min(12000,w));
  canvasH=Math.max(100,Math.min(12000,h));
  document.querySelectorAll('.pre').forEach(b=>b.classList.remove('on'));
  applyCanvas();
};

document.querySelectorAll('.pre').forEach(b=>{
  b.addEventListener('click',()=>{
    const u=b.dataset.u||'px', dpi=parseInt(document.getElementById('cDPI').value)||300;
    let w=parseFloat(b.dataset.w), h=parseFloat(b.dataset.h);
    document.getElementById('cW').value=w; document.getElementById('cH').value=h;
    document.getElementById('cUnit').value=u; document.getElementById('uLbl').textContent=u;
    if(u==='in'){canvasW=Math.round(w*dpi);canvasH=Math.round(h*dpi);}
    else if(u==='mm'){canvasW=Math.round(w*dpi/25.4);canvasH=Math.round(h*dpi/25.4);}
    else{canvasW=Math.round(w);canvasH=Math.round(h);}
    document.querySelectorAll('.pre').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    applyCanvas();
  });
});

// ═══════════════ RULERS ═══════════════
function drawRuler(canvas, len, S, dir){
  // Ruler in CM. pxPerCm = DPI / 2.54
  const dpi = parseInt(document.getElementById('cDPI').value)||300;
  const pxPerCm = dpi / 2.54;           // canvas px per 1 cm
  const screenPerCm = pxPerCm * zoom;   // screen px per 1 cm

  canvas.width = dir==='h'?len:S;
  canvas.height = dir==='h'?S:len;
  if(dir==='h') canvas.style.width=len+'px'; else canvas.style.height=len+'px';
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#fafaf8'; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Choose cm step so labels aren't too dense
  const cmSteps=[0.1,0.2,0.5,1,2,5,10,20];
  let cmStep=1; for(const s of cmSteps){if(s*screenPerCm>=36){cmStep=s;break;}}
  const subStep=cmStep/5; // minor ticks

  ctx.font='7px Geist Mono, monospace'; ctx.textBaseline='top';

  const totalCm = (len/zoom) / pxPerCm;
  for(let cm=0; cm<=totalCm+subStep; cm=Math.round((cm+subStep)*1000)/1000){
    const pos=Math.round(cm*screenPerCm); if(pos>len) break;
    const isMain=Math.abs(Math.round(cm/cmStep)*cmStep - cm) < subStep*0.01;
    const isMid=Math.abs(Math.round(cm/cmStep*2)*cmStep/2 - cm) < subStep*0.01 && !isMain;
    const th=isMain?S*.5:isMid?S*.32:S*.16;
    ctx.strokeStyle=isMain?'#b0afaa':isMid?'#d0cfc8':'#e4e3dc';
    ctx.lineWidth=isMain?1:.5;
    ctx.beginPath();
    if(dir==='h'){
      ctx.moveTo(pos+.5,S-th); ctx.lineTo(pos+.5,S);
      if(isMain&&cm>0){
        ctx.fillStyle='#8a8a84';
        const lbl=Number.isInteger(cm)?cm+'':cm.toFixed(1);
        ctx.fillText(lbl,pos+2,1);
      }
    } else {
      ctx.moveTo(S-th,pos+.5); ctx.lineTo(S,pos+.5);
      if(isMain&&cm>0){
        ctx.save(); ctx.fillStyle='#8a8a84';
        ctx.translate(S-th-1,pos+2); ctx.rotate(-Math.PI/2);
        const lbl=Number.isInteger(cm)?cm+'':cm.toFixed(1);
        ctx.fillText(lbl,0,0); ctx.restore();
      }
    }
    ctx.stroke();
  }
}

function makePageDOM(pi){
  const wrap=document.createElement('div'); wrap.style.cssText='display:flex;flex-direction:column;';
  const sep=document.createElement('div'); sep.className='page-sep';
  sep.innerHTML=`<div class="page-sep-line"></div><div class="page-sep-lbl" id="plbl-${pi}">PAGE ${pi+1}</div><div class="page-sep-line"></div>`;
  wrap.appendChild(sep);
  const rrW=document.createElement('div'); rrW.className='rr-wrap';
  const topR=document.createElement('div'); topR.className='rr-row';
  const corner=document.createElement('div'); corner.className='rr-corner';
  const rH=document.createElement('canvas'); rH.className='rr-h';
  topR.appendChild(corner); topR.appendChild(rH);
  const midR=document.createElement('div'); midR.className='rr-row';
  const rV=document.createElement('canvas'); rV.className='rr-v';
  const co=document.createElement('div'); co.className='canvas-outer';
  const dw=Math.round(canvasW*zoom), dh=Math.round(canvasH*zoom);
  co.style.width=dw+'px'; co.style.height=dh+'px';
  midR.appendChild(rV); midR.appendChild(co);
  rrW.appendChild(topR); rrW.appendChild(midR);
  wrap.appendChild(rrW);
  drawRuler(rH,dw,18,'h'); drawRuler(rV,dh,18,'v');
  return {wrap,co};
}

function handleFiles(files){
  const arr=Array.from(files).filter(f=>f.type.startsWith('image/'));
  let loaded=0;
  arr.forEach(file=>{
    const hash=photoHash(file);
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const rk=snapRatio(img.width,img.height);
        const isDup=photos.some(p=>p.hash===hash);
        photos.push({id:makeId(),name:file.name,src:e.target.result,hash,natW:img.width,natH:img.height,ratio:img.width/img.height,rk,isDup});
        if(++loaded===arr.length){
          rebuildRowOrder();
          renderPhotoList();
          renderRowList();
          arrange();
          checkDuplicates();
          document.getElementById('hCount').textContent=photos.length;
        }
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ═══════════════ ROW ORDER ═══════════════
function rebuildRowOrder(){
  // Keep custom rows, rebuild auto rows
  const customRows=rowOrder.filter(e=>e.type==='custom');
  // Remove custom rows for photos that no longer exist
  const validIds=new Set(photos.map(p=>p.id));
  const cleanCustom=customRows
    .map(e=>({...e,photoIds:e.photoIds.filter(id=>validIds.has(id))}))
    .filter(e=>e.photoIds.length>0);

  // Photos already in custom rows
  const claimedIds=new Set(cleanCustom.flatMap(e=>e.photoIds));

  // Auto-group remaining photos by rk, preserving existing auto order
  const freePhotos=photos.filter(p=>!claimedIds.has(p.id));
  const seen=new Set(); const newRks=[];
  freePhotos.forEach(p=>{if(!seen.has(p.rk)){seen.add(p.rk);newRks.push(p.rk);}});

  // Keep existing auto entries whose rk still exists, add new ones
  const existingAuto=rowOrder.filter(e=>e.type==='auto'&&seen.has(e.keys[0]));
  const existingRks=new Set(existingAuto.map(e=>e.keys[0]));
  const newAutoEntries=newRks.filter(rk=>!existingRks.has(rk)).map(rk=>({
    type:'auto', id:'auto-'+rk, keys:[rk], settings:{...defSettings()}
  }));

  // Rebuild: keep custom rows in place, rebuild auto entries
  const autoEntries=[...existingAuto,...newAutoEntries];
  rowOrder=[...cleanCustom,...autoEntries];
}

// ═══════════════ COMPUTE + ARRANGE ═══════════════
function computeLayout(){
  const byRk={}; photos.forEach(p=>{if(!byRk[p.rk])byRk[p.rk]=[];byRk[p.rk].push(p);});
  const claimedByCustom=new Set(rowOrder.filter(e=>e.type==='custom').flatMap(e=>e.photoIds));
  const out=[];

  rowOrder.forEach(entry=>{
    const isCustom=entry.type==='custom';
    let pool, color, label;
    if(isCustom){
      pool=photos.filter(p=>entry.photoIds.includes(p.id));
      color='#d4622a'; label='Custom';
    } else {
      const rk=entry.keys[0];
      pool=(byRk[rk]||[]).filter(p=>!claimedByCustom.has(p.id));
      color=rkColor(rk); label=rk;
    }
    if(!pool.length)return;

    const {rowH,gap,perRow}=entry.settings;
    const chunkSize=perRow>0?perRow:pool.length;

    for(let i=0;i<pool.length;i+=chunkSize){
      const chunk=pool.slice(i,i+chunkSize);
      const n=chunk.length, g=gap;
      let cellH, cellWidths, imgWidths, imgHeights;

      if(perRow===0){
        // Fill width: all cells same height, widths proportional to ratio
        const sumR=chunk.reduce((s,p)=>s+p.ratio,0);
        cellH=Math.max(10,Math.round((canvasW-g*(n+1))/sumR));
        cellWidths=chunk.map(p=>Math.round(p.ratio*cellH));
        imgWidths=cellWidths.slice(); // photo fills its cell exactly (same ratio)
        imgHeights=chunk.map(()=>cellH);
      } else {
        // Fixed N per row: equal cell widths, cellH from rowH setting
        const cw=Math.max(1,Math.round((canvasW-g*(n+1))/n));
        cellWidths=chunk.map(()=>cw);
        cellH=rowH; // uniform cell height from settings
        // Fit photo INSIDE cell keeping aspect ratio (contain, no crop)
        imgWidths=[]; imgHeights=[];
        chunk.forEach(p=>{
          const fitByW=cw, fitH_byW=Math.round(cw/p.ratio);
          const fitByH=cellH, fitW_byH=Math.round(cellH*p.ratio);
          if(fitH_byW<=cellH){
            imgWidths.push(fitByW); imgHeights.push(fitH_byW);
          } else {
            imgWidths.push(fitW_byH); imgHeights.push(fitByH);
          }
        });
      }
      out.push({photos:chunk,cellWidths,cellH,imgWidths,imgHeights,gap:g,color,label,entryId:entry.id});
    }
  });
  return out;
}

function arrange(){
  Array.from(pagesWrap.children).forEach(c=>c.remove());
  if(!photos.length){
    // Show empty state on blank canvas
    const {wrap,co}=makePageDOM(0);
    const e=document.createElement('div');e.className='empty';
    e.innerHTML='<div class="empty-ico">🖼</div><p>Upload photos to begin</p>';
    co.appendChild(e); pagesWrap.appendChild(wrap);
    document.getElementById('hPages').textContent='—';
    return;
  }

  const rows=computeLayout();
  if(!rows.length)return;

  // Paginate
  const pages=[]; let cur=[],cy=0;
  rows.forEach(row=>{
    const rh=row.rowH+row.gap;
    if(cy>0&&cy+rh>canvasH){pages.push(cur);cur=[];cy=0;}
    cur.push({row,y:cy}); cy+=rh;
  });
  if(cur.length)pages.push(cur);

  document.getElementById('hPages').textContent=`${pages.length}`;

  pages.forEach((pageRows,pi)=>{
    const {wrap,co}=makePageDOM(pi);
    const photoCount=pageRows.reduce((s,{row})=>s+row.photos.length,0);
    const lbl=wrap.querySelector(`#plbl-${pi}`);
    if(lbl)lbl.textContent=`PAGE ${pi+1}  ·  ${photoCount} photo${photoCount!==1?'s':''}`;

    pageRows.forEach(({row,y})=>{
      const rowEl=document.createElement('div'); rowEl.className='canvas-row';
      rowEl.style.top=Math.round(y*zoom)+'px';
      rowEl.style.left=Math.round(row.gap*zoom)+'px';
      rowEl.style.gap=Math.round(row.gap*zoom)+'px';
      rowEl.style.alignItems='flex-start';

      const tag=document.createElement('div'); tag.className='row-label';
      tag.style.background=row.color; tag.style.color='rgba(255,255,255,.85)';
      tag.textContent=row.label; rowEl.appendChild(tag);

      row.photos.forEach((ph,i)=>{
        // Uniform cell: cellWidth × cellH, photo inside (contain, no crop)
        const cw=Math.round(row.cellWidths[i]*zoom);
        const ch=Math.round(row.cellH*zoom);
        const iw=Math.round(row.imgWidths[i]*zoom);
        const ih=Math.round(row.imgHeights[i]*zoom);

        const cell=document.createElement('div');
        cell.className='canvas-cell';
        cell.style.width=cw+'px';
        cell.style.height=ch+'px';
        cell.dataset.photoId=ph.id;
        cell.dataset.entryId=row.entryId;
        cell.title=`${ph.name}  ${row.imgWidths[i]}×${row.imgHeights[i]}px`;

        const hint=document.createElement('div');
        hint.className='cell-drag-hint'; hint.textContent='⠿';
        cell.appendChild(hint);

        const img=document.createElement('img');
        img.src=ph.src;
        img.style.width=iw+'px'; img.style.height=ih+'px';
        cell.appendChild(img);

        bindCellDrag(cell, ph.id);
        rowEl.appendChild(cell);
      });
      co.appendChild(rowEl);
    });
    pagesWrap.appendChild(wrap);
  });
}

// ═══════════════ EXPORT ═══════════════
function buildPages(){
  const rows=computeLayout();
  const pages=[]; let cur=[],cy=0;
  rows.forEach(row=>{
    const rh=row.rowH+row.gap;
    if(cy>0&&cy+rh>canvasH){pages.push(cur);cur=[];cy=0;}
    cur.push({row,y:cy}); cy+=rh;
  });
  if(cur.length)pages.push(cur);
  return pages;
}

async function renderPage(pageRows){
  const ec=document.createElement('canvas');
  ec.width=canvasW; ec.height=canvasH;
  const ctx=ec.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvasW,canvasH);
  const draws=[];
  pageRows.forEach(({row,y})=>{
    let x=row.gap;
    row.photos.forEach((ph,i)=>{
      const cw=row.cellWidths[i], ch=row.cellH;
      const iw=row.imgWidths[i], ih=row.imgHeights[i];
      // Center photo in cell (contain, white pad around)
      const ox=Math.round((cw-iw)/2), oy=Math.round((ch-ih)/2);
      draws.push({src:ph.src, x:x+ox, y:y+oy, w:iw, h:ih});
      x+=cw+row.gap;
    });
  });
  return new Promise(res=>{
    if(!draws.length){res(ec);return;}
    let p=draws.length;
    draws.forEach(d=>{const img=new Image();img.onload=()=>{ctx.drawImage(img,d.x,d.y,d.w,d.h);if(--p===0)res(ec);};img.src=d.src;});
  });
}

function dl(c,n){const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=n;a.click();}

document.getElementById('btnExport').onclick=async()=>{
  const pages=buildPages(); if(!pages.length)return;
  const ec=await renderPage(pages[0]);
  dl(ec,`sticker-p1-${canvasW}x${canvasH}.png`);
};

document.getElementById('btnExportAll').onclick=async()=>{
  const pages=buildPages();
  for(let i=0;i<pages.length;i++){
    const ec=await renderPage(pages[i]);
    dl(ec,`sticker-p${i+1}-${canvasW}x${canvasH}.png`);
    if(i<pages.length-1)await new Promise(r=>setTimeout(r,300));
  }
};


// ═══════════════ CANVAS CELL DRAG ═══════════════
let dragCellPhotoId=null;

function bindCellDrag(cell, photoId){
  cell.draggable=true;

  cell.addEventListener('dragstart',e=>{
    dragCellPhotoId=photoId;
    cell.classList.add('dragging-cell');
    e.dataTransfer.effectAllowed='move';
    e.stopPropagation();
  });

  cell.addEventListener('dragend',()=>{
    dragCellPhotoId=null;
    document.querySelectorAll('.canvas-cell').forEach(c=>{
      c.classList.remove('dragging-cell','drop-before','drop-after');
    });
  });

  cell.addEventListener('dragover',e=>{
    e.preventDefault(); e.stopPropagation();
    if(!dragCellPhotoId||dragCellPhotoId===photoId)return;
    // Determine drop side: left half = before, right half = after
    const rect=cell.getBoundingClientRect();
    const mid=rect.left+rect.width/2;
    document.querySelectorAll('.canvas-cell').forEach(c=>c.classList.remove('drop-before','drop-after'));
    if(e.clientX<mid) cell.classList.add('drop-before');
    else cell.classList.add('drop-after');
  });

  cell.addEventListener('dragleave',()=>{
    cell.classList.remove('drop-before','drop-after');
  });

  cell.addEventListener('drop',e=>{
    e.preventDefault(); e.stopPropagation();
    cell.classList.remove('drop-before','drop-after');
    if(!dragCellPhotoId||dragCellPhotoId===photoId)return;

    const rect=cell.getBoundingClientRect();
    const mid=rect.left+rect.width/2;
    const dropAfter=e.clientX>=mid;

    const fi=photos.findIndex(p=>p.id===dragCellPhotoId);
    const ti=photos.findIndex(p=>p.id===photoId);
    if(fi<0||ti<0)return;

    const [moved]=photos.splice(fi,1);
    let newTi=photos.findIndex(p=>p.id===photoId);
    if(dropAfter) newTi++;
    photos.splice(Math.max(0,newTi),0,moved);

    rebuildRowOrder();
    renderPhotoList();
    renderRowList();
    arrange();
  });
}

// ═══════════════ CLEAR / REFRESH ═══════════════
document.getElementById('btnRearrange').onclick=()=>{rebuildRowOrder();renderRowList();arrange();};

document.getElementById('btnClear').onclick=()=>{
  photos=[];rowOrder=[];selectedPhotoIds.clear();
  Object.keys(rkColorMap).forEach(k=>delete rkColorMap[k]);ci=0;
  document.getElementById('photoList').innerHTML='';
  document.getElementById('hCount').textContent='0';
  document.getElementById('hPages').textContent='—';
  renderRowList(); arrange(); checkDuplicates();
};

// ═══════════════ INIT ═══════════════
applyCanvas();
setTimeout(()=>document.getElementById('zFit').click(),150);
